name: Method suggestion
description: Suggest a new multimodal integration method or update an existing entry.
title: "Method suggestion: "
labels: ["method suggestion", "curation"]
body:
  - type: input
    id: method
    attributes:
      label: Method name
      description: Official or commonly used method name.
    validations:
      required: true
  - type: input
    id: citation
    attributes:
      label: Citation or DOI
      description: DOI, preprint link, journal page, or repository.
    validations:
      required: true
  - type: dropdown
    id: method_family
    attributes:
      label: Method family
      options:
        - Deterministic
        - Probabilistic
        - VAE / Representation learning
        - Foundation models
        - MIL
        - Contrastive learning
        - Other / unsure
    validations:
      required: true
  - type: dropdown
    id: axis_correspondence
    attributes:
      label: Correspondence
      options:
        - paired
        - partial
        - unpaired
        - unsure
    validations:
      required: true
  - type: dropdown
    id: axis_missingness
    attributes:
      label: Missingness
      options:
        - none
        - partial
        - modality
        - generative
        - unsure
    validations:
      required: true
  - type: dropdown
    id: granularity
    attributes:
      label: Granularity
      options:
        - single-level
        - multi-level
        - unsure
    validations:
      required: true
  - type: dropdown
    id: prior
    attributes:
      label: Prior knowledge
      options:
        - none
        - structure
        - supervision
        - soft
        - unsure
    validations:
      required: true
  - type: dropdown
    id: latent_design
    attributes:
      label: Latent design
      options:
        - structured
        - unstructured
        - unsure
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - white-box
        - black-box
        - unsure
    validations:
      required: true
  - type: dropdown
    id: application_level
    attributes:
      label: Application level
      options:
        - general-purpose
        - application-driven
        - unsure
    validations:
      required: true
  - type: input
    id: supervision
    attributes:
      label: Supervision
      description: Use the manuscript term if known.
      placeholder: supervised, unsupervised, self-supervised, semi-supervised, or unsure
    validations:
      required: true
  - type: input
    id: task
    attributes:
      label: Application type
      description: For example discovery, alignment, imputation, prediction, deconvolution, generation.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Evidence and rationale
      description: Briefly explain why the method should be classified this way.
    validations:
      required: true
